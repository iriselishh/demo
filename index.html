<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafarRiss Architecture</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
}

/* Navigation bar */

nav{
    background-color:#222;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
}

/* Logo */

.logo{
    color:white;
    font-size:24px;
    font-weight:bold;
}

/* Navigation links */

.nav-links a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    font-size:18px;
}

.nav-links a:hover{
    color:lightgray;
}

/* Cover section */

.hero{
    height:90vh;
    background-image:url("architecture.jpg"); /* change to your image name */
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.hero h1{
    font-size:60px;
    margin:0;
}

.hero p{
    font-size:22px;
}

button{
    padding:12px 25px;
    font-size:16px;
    border:none;
    background-color:#333;
    color:white;
    margin-top:20px;
    cursor:pointer;
}

button:hover{
    background-color:#555;
}

</style>
</head>

<body>

<!-- Navigation -->

<nav>
<div class="logo">SafarRiss</div>

<div class="nav-links">
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Gallery</a>
<a href="#">Styles</a>
<a href="#">Contact</a>
</div>
</nav>

<!-- Cover Section -->

<div class="hero">
<div>
<h1>Architecture World</h1>
<p>Exploring design, buildings and creativity</p>
<button>Learn More</button>
</div>
</div>

</body>
</html>
